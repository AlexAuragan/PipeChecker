connectors:
- proxmox
pipelines:
- cron: 0 10,18 * * *
  name: File-keeper
  pipeline:
  - check_method: stdout_not_empty
    check_pattern: null
    exec: which curl
    id: curl-installed
    if_failed: apt install curl -y
    requires: []
  - check_method: stdout_contains
    check_pattern: Up to date
    exec: diff <(fk --version) <(curl -s https://raw.githubusercontent.com/AlexAuragan/File-Keeper/main/.version)
      && echo "Up to date" || echo "Update available"
    id: fk-installed
    if_failed: curl -sSL https://raw.githubusercontent.com/AlexAuragan/file-keeper/main/install.sh
      | bash
    requires:
    - curl-installed
  - check_method: stdout_not_empty
    check_pattern: null
    exec: which uv
    id: uv-installed
    if_failed: curl -LsSf https://astral.sh/uv/install.sh | sh
    requires:
    - curl-installed
  runner: proxmox_ct
