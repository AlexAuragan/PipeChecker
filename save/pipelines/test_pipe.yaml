connectors:
- proxmox
pipelines:
- name: File-keeper
  runner: proxmox_ct
  cron: 0 10,18 * * *
  pipeline:
  - check_method: stdout_not_empty
    check_pattern: null
    exec: which curl
    id: curl-installed
    if_failed: apt install curl -y
    requires: []
  - check_method: stdout_not_empty
    check_pattern: null
    exec: which fk
    id: fk-installed
    if_failed: curl -sSL https://raw.githubusercontent.com/AlexAuragan/file-keeper/main/install.sh
      | bash
    requires:
    - curl-installed
  - check_method: stdout_not_empty
    check_pattern: null
    exec: which uv
    id: uv-installed
    if_failed: curl -LsSf https://astral.sh/uv/install.sh | sh
    requires:
    - curl-installed
