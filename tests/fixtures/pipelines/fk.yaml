runner: proxmox_ct
connectors:
  - proxmox
cron: 0 10,18 * * *
pipelines:
  - name: curl
    pipeline:
      - id: curl-installed
        exec: which curl
        check_method: stdout_not_empty
        if_failed: apt install curl -y
  - name: File-keeper
    requires: curl
    pipeline:
      - id: fk-installed
        exec: which fk
        check_method: stdout_not_empty
        if_failed: curl -sSL https://raw.githubusercontent.com/AlexAuragan/file-keeper/main/install.sh | bash