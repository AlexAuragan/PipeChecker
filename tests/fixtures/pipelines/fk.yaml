connectors:
  - proxmox
pipelines:
  - name: curl
    runner: proxmox_ct
    cron: 0 10,18 * * *
    pipeline:
      - id: curl-installed
        exec: which curl
        check_method: stdout_not_empty
  - name: File-keeper
    runner: proxmox_ct
    cron: 0 10,18 * * *
    pipeline:
      - id: fk-installed
        exec: which fk
        check_method: stdout_not_empty
